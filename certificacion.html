<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Certificación</title>
<link rel="stylesheet" href="style.css">
<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f4f4f4;
        text-align: center;
    }
    .container {
        background: white;
        width: 500px;
        margin: 60px auto;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
    }
    h2 {
        margin-bottom: 20px;
    }
    table {
        width: 100%;
        border-collapse: collapse;
    }
    td {
        border: 1px solid #ccc;
        padding: 10px;
        text-align: left;
    }
    .ok {
        margin-top: 15px;
        padding: 12px;
        background-color: #d4edda;
        color: #155724;
        font-weight: bold;
        border-radius: 5px;
    }
    .btn {
        margin-top: 15px;
        padding: 10px 15px;
        background-color: #007bff;
        color: white;
        text-decoration: none;
        border-radius: 5px;
        display: inline-block;
    }
</style>
</head>

<body>

<div class="container">
    <h2>Datos de la Certificación</h2>

    <table>
        <tr>
            <td><strong>Tipo de Certificado</strong></td>
            <td>Certificado de Alumno Regular</td>
        </tr>
        <tr>
            <td><strong>Fecha de Emisión</strong></td>
            <td>11/02/2026 13:51:56</td>
        </tr>
        <tr>
            <td><strong>Legajo</strong></td>
            <td>128647</td>
        </tr>
        <tr>
            <td><strong>Apellido y Nombres</strong></td>
            <td>PEREZ, BENJAMIN</td>
        </tr>
        <tr>
            <td><strong>Tipo y Número de Documento</strong></td>
            <td>DNI - 48106647</td>
        </tr>
        <tr>
            <td><strong>Carrera</strong></td>
            <td>INGENIERÍA CIVIL</td>
        </tr>
    </table>

    <div class="ok">
        Certificado verificado correctamente
    </div>

    <a href="index.html" class="btn">Volver</a>
</div>

</body>
</html>
